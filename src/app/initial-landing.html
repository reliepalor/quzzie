<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 sm:p-6">

  <div class="w-full max-w-md bg-transparent 
              sm:rounded-3xl sm:shadow-xl sm:border sm:border-slate-200 
              p-6 sm:p-8 text-center">

    <!-- HERO IMAGE -->
    <div class="flex justify-center mb-6">
      <img 
        src="/images/quiz-hero.png"
        alt="Quiz learning illustration"
        class="w-48 sm:w-64 object-contain">
    </div>

    <!-- MAIN MESSAGE -->
    <h2 class="text-lg sm:text-xl font-bold text-slate-800 mb-2">
      Test Your Wisdom
    </h2>

    <p class="text-slate-500 text-sm leading-relaxed mb-8">
      Generate smart quizzes instantly using AI.  
      Learn faster, review topics, and challenge your knowledge.
    </p>

    <!-- CTA BUTTON -->
    <button
      [routerLink]="['/quizzie']"
      class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl
             hover:bg-blue-700 transition-all sm:shadow-lg sm:shadow-blue-200">

      Get Started

    </button>

  </div>

</div>
